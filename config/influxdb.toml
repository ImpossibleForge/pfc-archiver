# pfc-archiver — InfluxDB v2 Configuration Example
# =================================================
# InfluxDB v2 HTTP API port: 8086
# Run:
#   python pfc_archiver.py --config config/influxdb.toml --dry-run

[db]
db_type     = "influxdb"
host        = "localhost"
port        = 8086
scheme      = "http"
token       = "mytoken"            # InfluxDB v2 API token
org         = "myorg"
bucket      = "mybucket"
measurement = ""                   # leave empty to export all measurements
ts_column   = "_time"              # InfluxDB internal timestamp field

[archive]
retention_days         = 30
partition_days         = 7         # weekly chunks for InfluxDB data
output_dir             = "./local-archives/"
verify                 = true
delete_after_archive   = false      # InfluxDB: use DELETE API or bucket retention policy
log_dir                = "./archive_logs/"

# Note: After archiving, delete old InfluxDB data via:
#   POST /api/v2/delete  with start/stop timestamps
# Or set a shorter retention policy on the bucket.

[daemon]
interval_seconds = 3600
